info.app.name=Wigell Travel API
spring.application.name=Wigell Travel API
info.app.description=Booking system for trips
info.app.version=1.0.0
info.app.author=Markus E
info.app.course=Java Backend

server.port=8581

spring.boot.admin.client.url=http://localhost:8084
spring.boot.admin.client.username=admin
spring.boot.admin.client.password=admin
spring.boot.admin.client.instance.service.url=http://localhost:8581
spring.boot.admin.client.instance.management-base-url=http://localhost:6081

management.server.port=6081
management.endpoints.web.exposure.include=info,health
management.endpoint.health.show-details=always
management.info.env.enabled=true

#spring.profiles.active=dev
spring.profiles.active=prod

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.jackson.serialization.indent_output=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.config-url=/travels/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].name=Travels API
springdoc.swagger-ui.urls[0].url=/travels/v3/api-docs
springdoc.api-docs.override-with-generic-response=false
springdoc.default-produces-media-type=application/json
springdoc.swagger-ui.use-root-path=true
springdoc.api-docs.servers[0].url=/travels

springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true